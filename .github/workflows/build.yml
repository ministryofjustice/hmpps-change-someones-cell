name: Build and test node
# this custom script can be removed when govuk_frontend_toolkit is replaced.
# It generates a package-lock.json file which changes the hash key running hashFiles('**/package-lock.json')
on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Passed to setup-node action to specify where to source the version of node from"
        required: false
        type: string
        default: ".nvmrc"
      install_command:
        description: "The command used to install npm dependencies"
        required: false
        type: string
        default: "npm ci --no-audit"

permissions:
  contents: read

jobs:
  node-build:
    name: Run the node build
    runs-on: ubuntu-latest

    env:
      # ensure Cypress uses the directory we cache
      CYPRESS_CACHE_FOLDER: /home/runner/.cache/Cypress

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ inputs.node_version_file }}
        uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node_version_file }}

      - name: update npm
        shell: bash
        run: npm install -g npm@latest

      # -----------------------------------------------------
      # REFACTORED: single actions/cache@v4 (restore + auto-save)
      # -----------------------------------------------------
      - name: Cache node_modules + Cypress
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            ./node_modules
            /home/runner/.cache/Cypress
          key: ${{ runner.os }}-build-node-modules-${{ hashFiles('./package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-node-modules-

      - name: install dependencies
        shell: bash
        run: ${{ inputs.install_command }}

      # -----------------------------------------------------
      # ensures Cypress binary exists
      # Without this step, your cache NEVER contains a Cypress binary.
      # -----------------------------------------------------
      - name: Install Cypress binary
        run: npx cypress install

      - name: build npm
        shell: bash
        run: npm run build

      - name: Linter check
        shell: bash
        run: npm run lint

      - name: upload the artifacts
        uses: actions/upload-artifact@v5
        with:
          name: npm_build_artifacts
          path: |
            build/
            dist/
            assets/stylesheets/